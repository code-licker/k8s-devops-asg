version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: local_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: psswd
      POSTGRES_DB: anime_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=psswd
      - DB_NAME=anime_db
      - PORT=3000
    depends_on:
      - postgres-db

volumes:
  pgdata: