apiVersion: apps/v1
kind: Deployment
metadata:
  name: anime-api-deployment
  labels:
    app: anime-api
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: anime-api
  template:
    metadata:
      labels:
        app: anime-api
    spec:
      containers:
        - name: anime-api
          image: ghcr.io/code-licker/nagp-2026-anime-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
              name: api
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: anime-api-configmap
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: anime-api-configmap
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: anime-api-configmap
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: anime-api-configmap
                  key: DB_NAME
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: anime-api-configmap
                  key: PORT
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: anime-db-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 5